version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
    environment:
      FLASK_ENV: development
      FLASK_APP: src/app.py

  # Add any additional services here if needed, such as a database service.